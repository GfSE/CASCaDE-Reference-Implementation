services:
  web:
    build: 
      context: ../
      dockerfile: docker/web.Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ../
      dockerfile: docker/api.Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
 
  db:
    image: postgres
    restart: always
    env_file: "postgres.env"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "cas_user"]
      interval: 1s
      timeout: 5s
      retries: 10
 
  adminer:
    image: adminer
    restart: always
    ports:
      - 8081:8080
    
networks:
  default:
    driver: bridge